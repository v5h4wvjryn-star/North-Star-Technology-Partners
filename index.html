<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>North Star Technology Partners</title>

  <!-- Tailwind CSS for Styling -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Babel for parsing JSX in the browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Import Map to handle React and Lucide imports from CDN -->
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.2.0",
      "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
      "lucide-react": "https://esm.sh/lucide-react@0.263.1"
    }
  }
  </script>
</head>
<body class="bg-white">
  <div id="root"></div>

  <!-- Main Application Script -->
  <script type="text/babel" data-type="module">
    import React, { useState, useEffect } from 'react';
    import { createRoot } from 'react-dom/client';
    import {
      Phone, Mail, MapPin, Menu, X,
      ChevronRight, ArrowRight, CheckCircle2,
      MessageSquare, FileText, Zap, ClipboardList,
      Wrench, Users
    } from 'lucide-react';

    // --- MAIN WEBSITE COMPONENT ---
    const Website = () => {
      const [isMenuOpen, setIsMenuOpen] = useState(false);
      const [scrolled, setScrolled] = useState(false);

      useEffect(() => {
        const handleScroll = () => {
          setScrolled(window.scrollY > 20);
        };
        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      const handleNavClick = (sectionId) => {
        setIsMenuOpen(false);
        if (sectionId === 'home') {
          window.scrollTo({ top: 0, behavior: 'smooth' });
        } else {
          setTimeout(() => {
            const element = document.getElementById(sectionId);
            if (element) {
              element.scrollIntoView({ behavior: 'smooth' });
            }
          }, 100);
        }
      };

      const handleCTA = () => {
        window.location.href = "mailto:info@NSTP.com?subject=Here's My Problem";
      };

      const problems = [
        {
          icon: FileText,
          colorBg: "bg-blue-600",
          colorText: "text-blue-600",
          colorLight: "bg-blue-50",
          title: "You're tracking things on paper, in a spreadsheet, or in someone's head",
          description: "Every time you need that information, someone has to dig for it. Things fall through the cracks. And when that one person is out? Good luck."
        },
        {
          icon: MessageSquare,
          colorBg: "bg-indigo-600",
          colorText: "text-indigo-600",
          colorLight: "bg-indigo-50",
          title: "Customers go quiet and nobody's following up consistently",
          description: "Following up manually is exhausting and it never happens the same way twice. Some customers get called. Others don't. Revenue slips through the gaps."
        },
        {
          icon: ClipboardList,
          colorBg: "bg-purple-600",
          colorText: "text-purple-600",
          colorLight: "bg-purple-50",
          title: "Proving the work got done is harder than doing the work",
          description: "Whether it's an inspection, a delivery, or a service call — documenting it properly takes as long as the job itself. And half the time it still ends up in a dispute."
        },
        {
          icon: Zap,
          colorBg: "bg-orange-500",
          colorText: "text-orange-500",
          colorLight: "bg-orange-50",
          title: "There's a task your team does every single week that nobody has automated",
          description: "You've thought about fixing it. You've even mentioned it a few times. But there's never been someone who could actually sit down and build the fix — until now."
        }
      ];

      return (
        <div className="min-h-screen bg-white font-sans text-slate-800">

          {/* ── Navigation ── */}
          <nav className="fixed w-full z-50 bg-white shadow-md py-4 transition-all duration-300">
            <div className="container mx-auto px-6 flex justify-between items-center">
              <div
                className="flex items-center cursor-pointer group"
                onClick={() => handleNavClick('home')}
              >
                <img
                  src="logo2 white.png"
                  alt="North Star Technology Partners"
                  className="w-auto transition-transform duration-300 group-hover:scale-105"
                  style={{ height: '80px' }}
                />
              </div>

              <div className="hidden lg:flex items-center gap-8">
                <button onClick={() => handleNavClick('problems')} className="font-medium text-slate-600 hover:text-blue-500 transition-colors">Problems We Solve</button>
                <button onClick={() => handleNavClick('how-it-works')} className="font-medium text-slate-600 hover:text-blue-500 transition-colors">How It Works</button>
                <button onClick={() => handleNavClick('contact')} className="font-medium text-slate-600 hover:text-blue-500 transition-colors">Contact</button>
                <button onClick={handleCTA} className="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-full font-medium transition-all shadow-lg shadow-blue-600/30 flex items-center gap-2">
                  Tell Me Your Problem <ChevronRight className="w-4 h-4" />
                </button>
              </div>

              <button className="lg:hidden text-slate-900" onClick={() => setIsMenuOpen(!isMenuOpen)}>
                {isMenuOpen ? <X /> : <Menu />}
              </button>
            </div>

            {isMenuOpen && (
              <div className="lg:hidden absolute top-full left-0 w-full bg-white shadow-lg border-t border-slate-100 py-4 px-6 flex flex-col gap-4">
                <button onClick={() => handleNavClick('problems')} className="text-left py-2 text-slate-600 font-medium border-b border-slate-50">Problems We Solve</button>
                <button onClick={() => handleNavClick('how-it-works')} className="text-left py-2 text-slate-600 font-medium border-b border-slate-50">How It Works</button>
                <button onClick={() => handleNavClick('contact')} className="text-left py-2 text-slate-600 font-medium border-b border-slate-50">Contact</button>
                <button onClick={handleCTA} className="bg-blue-600 text-white w-full py-3 rounded-lg font-medium">Tell Me Your Problem</button>
              </div>
            )}
          </nav>

          {/* ── Hero Section ── */}
          <div className="relative pt-32 pb-20 lg:pt-48 lg:pb-32 overflow-hidden bg-slate-900">
            <div className="absolute inset-0 opacity-20 pointer-events-none">
              <div className="absolute top-0 right-0 w-1/2 h-full bg-blue-600 rounded-l-full blur-3xl transform translate-x-1/3"></div>
              <div className="absolute bottom-0 left-0 w-1/3 h-full bg-indigo-600 rounded-r-full blur-3xl transform -translate-x-1/3"></div>
            </div>
            <div className="container mx-auto px-6 relative z-10">
              <div className="max-w-3xl text-white">
                <div className="inline-flex items-center gap-2 bg-blue-900/50 border border-blue-700/50 rounded-full px-4 py-1 mb-8">
                  <span className="flex h-2 w-2 rounded-full bg-blue-400 animate-pulse"></span>
                  <span className="text-sm font-medium text-blue-100">Built for small business — any industry</span>
                </div>
                <h1 className="text-5xl lg:text-6xl font-bold leading-tight mb-8">
                  If your business runs on spreadsheets, sticky notes, and group texts —{' '}
                  <span className="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-400">we should talk.</span>
                </h1>
                <p className="text-xl text-slate-300 mb-10 leading-relaxed max-w-2xl">
                  We build micro-apps and custom workflows that replace the workarounds your team is already doing manually. No buzzwords. No complexity. Just a fix that works — starting this week.
                </p>
                <div className="flex flex-col sm:flex-row gap-4">
                  <button onClick={handleCTA} className="bg-blue-600 hover:bg-blue-700 text-white px-8 py-4 rounded-full font-bold text-lg transition-all flex items-center justify-center gap-2 shadow-lg shadow-blue-900/20">
                    Tell Me Your Problem <ArrowRight className="w-5 h-5" />
                  </button>
                  <button onClick={() => handleNavClick('problems')} className="bg-transparent border border-slate-600 hover:bg-slate-800 text-white px-8 py-4 rounded-full font-bold text-lg transition-all">
                    See What We Fix
                  </button>
                </div>
              </div>
            </div>
          </div>

          {/* ── Trust Bar ── */}
          <div className="bg-white py-12 border-b border-slate-100">
            <div className="container mx-auto px-6">
              <div className="grid grid-cols-2 md:grid-cols-4 gap-8">
                {[
                  { number: "Any Industry", label: "If the problem is real, we can fix it" },
                  { number: "This Week", label: "A working solution, not a proposal" },
                  { number: "Plain English", label: "No tech jargon, ever" },
                  { number: "Small Business", label: "Built for owners, not IT departments" }
                ].map((stat, idx) => (
                  <div key={idx} className="text-center group hover:-translate-y-1 transition-transform duration-300">
                    <div className="text-2xl font-bold text-blue-600 mb-2">{stat.number}</div>
                    <div className="text-slate-500 font-medium group-hover:text-blue-600 transition-colors text-sm">{stat.label}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* ── Problems We Solve ── */}
          <section id="problems" className="py-24 bg-slate-50">
            <div className="container mx-auto px-6">
              <div className="text-center max-w-2xl mx-auto mb-16">
                <h2 className="text-sm font-bold text-blue-600 uppercase tracking-widest mb-3">Sound Familiar?</h2>
                <h3 className="text-3xl lg:text-4xl font-bold text-slate-900 mb-6">Problems We Solve</h3>
                <p className="text-slate-600 text-lg">
                  These aren't tech problems. They're business problems that happen to have a fix. Here's what we hear most often.
                </p>
              </div>
              <div className="grid md:grid-cols-2 gap-8">
                {problems.map((problem, idx) => {
                  const Icon = problem.icon;
                  return (
                    <div key={idx} className="bg-white p-8 rounded-2xl shadow-sm hover:shadow-xl transition-all duration-300 border border-slate-100 group">
                      <div className={`p-3 rounded-xl ${problem.colorLight} inline-block mb-6 group-hover:scale-110 transition-transform duration-300`}>
                        <Icon className={`w-8 h-8 ${problem.colorText}`} />
                      </div>
                      <h4 className="text-xl font-bold text-slate-900 mb-3">{problem.title}</h4>
                      <p className="text-slate-600 leading-relaxed">{problem.description}</p>
                    </div>
                  );
                })}
              </div>
            </div>
          </section>

          {/* ── Who This Is For ── */}
          <section className="py-24 bg-white">
            <div className="container mx-auto px-6">
              <div className="flex flex-col lg:flex-row items-center gap-16">
                <div className="lg:w-1/2">
                  <div className="relative group">
                    <div className="absolute inset-0 bg-blue-600 rounded-3xl transform rotate-3 opacity-10 group-hover:rotate-6 transition-transform duration-500"></div>
                    <img
                      src="Northstar%20Technology%20group.png"
                      alt="North Star Technology Partners Team"
                      className="rounded-3xl shadow-2xl relative z-10 w-full object-cover transition-transform duration-500 group-hover:-translate-y-2"
                      style={{ minHeight: '400px' }}
                    />
                  </div>
                </div>
                <div className="lg:w-1/2">
                  <h2 className="text-sm font-bold text-blue-600 uppercase tracking-widest mb-3">Who This Is For</h2>
                  <h3 className="text-3xl lg:text-4xl font-bold text-slate-900 mb-6">This Is For You</h3>
                  <p className="text-slate-600 text-lg mb-6 leading-relaxed">
                    If you own a small business and you have a process that's held together with workarounds, manual steps, or things that only work because one person remembers to do them — this is for you.
                  </p>
                  <p className="text-slate-700 text-xl font-semibold mb-8 leading-relaxed">
                    We don't care what industry you're in.
                  </p>
                  <div className="space-y-4">
                    {[
                      "You've tried to fix it yourself and ran out of time",
                      "You've looked at software and nothing quite fits",
                      "You're not sure if it's even fixable",
                      "You just want someone to understand the problem first"
                    ].map((item, idx) => (
                      <div key={idx} className="flex items-center gap-3 group">
                        <CheckCircle2 className="w-6 h-6 text-green-500 flex-shrink-0 group-hover:scale-110 transition-transform" />
                        <span className="text-slate-700 font-medium">{item}</span>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </div>
          </section>

          {/* ── How It Works ── */}
          <section id="how-it-works" className="py-24 bg-slate-50">
            <div className="container mx-auto px-6">
              <div className="text-center max-w-2xl mx-auto mb-16">
                <h2 className="text-sm font-bold text-blue-600 uppercase tracking-widest mb-3">Simple Process</h2>
                <h3 className="text-3xl lg:text-4xl font-bold text-slate-900 mb-6">How It Works</h3>
                <p className="text-slate-600 text-lg">Three steps. No long contracts. No confusing jargon.</p>
              </div>
              <div className="grid md:grid-cols-3 gap-8">
                {[
                  {
                    step: "01",
                    icon: MessageSquare,
                    title: "You Describe the Problem",
                    description: "Tell us what's driving you crazy. Don't try to frame it as a tech problem — just tell us what's broken, slow, or falling through the cracks. We'll take it from there."
                  },
                  {
                    step: "02",
                    icon: Wrench,
                    title: "We Build the Fix",
                    description: "We turn your problem into a simple, working solution. No bloated software package. No six-month implementation. Just a targeted fix built specifically for your situation."
                  },
                  {
                    step: "03",
                    icon: CheckCircle2,
                    title: "Your Team Uses It Starting This Week",
                    description: "We hand it off, walk your team through it, and make sure it actually works in the real world. If something needs tweaking, we tweak it."
                  }
                ].map((step, idx) => {
                  const Icon = step.icon;
                  return (
                    <div key={idx} className="bg-white p-8 rounded-2xl shadow-sm hover:shadow-xl transition-all duration-300 border border-slate-100 group relative overflow-hidden">
                      <div className="text-7xl font-bold text-slate-100 absolute top-4 right-6 group-hover:text-blue-50 transition-colors select-none">{step.step}</div>
                      <div className="bg-blue-50 p-3 rounded-xl inline-block mb-6 group-hover:scale-110 transition-transform duration-300 relative z-10">
                        <Icon className="w-8 h-8 text-blue-600" />
                      </div>
                      <h4 className="text-xl font-bold text-slate-900 mb-3 relative z-10">{step.title}</h4>
                      <p className="text-slate-600 leading-relaxed relative z-10">{step.description}</p>
                    </div>
                  );
                })}
              </div>
            </div>
          </section>

          {/* ── Real Problems. Real Fixes. (Case Study Placeholder) ── */}
          <section className="py-24 bg-white">
            <div className="container mx-auto px-6">
              <div className="text-center max-w-2xl mx-auto mb-16">
                <h2 className="text-sm font-bold text-blue-600 uppercase tracking-widest mb-3">In The Real World</h2>
                <h3 className="text-3xl lg:text-4xl font-bold text-slate-900 mb-6">Real Problems. Real Fixes.</h3>
                <p className="text-slate-600 text-lg">
                  Every fix we build starts with a real business owner who was tired of doing it the hard way. Here's what that looks like.
                </p>
              </div>
              <div className="grid md:grid-cols-3 gap-8">
                {[
                  {
                    industry: "Coming Soon",
                    problem: "Problem description here",
                    fix: "What we built to fix it",
                    result: "The outcome for their business"
                  },
                  {
                    industry: "Coming Soon",
                    problem: "Problem description here",
                    fix: "What we built to fix it",
                    result: "The outcome for their business"
                  },
                  {
                    industry: "Coming Soon",
                    problem: "Problem description here",
                    fix: "What we built to fix it",
                    result: "The outcome for their business"
                  }
                ].map((study, idx) => (
                  <div key={idx} className="bg-slate-50 border-2 border-dashed border-slate-200 p-8 rounded-2xl group hover:border-blue-300 transition-colors duration-300">
                    <div className="inline-block bg-blue-100 text-blue-700 text-xs font-bold uppercase tracking-widest px-3 py-1 rounded-full mb-6">{study.industry}</div>
                    <div className="space-y-5">
                      <div>
                        <p className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">The Problem</p>
                        <p className="text-slate-400 italic text-sm">{study.problem}</p>
                      </div>
                      <div>
                        <p className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">The Fix</p>
                        <p className="text-slate-400 italic text-sm">{study.fix}</p>
                      </div>
                      <div>
                        <p className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">The Result</p>
                        <p className="text-slate-400 italic text-sm">{study.result}</p>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </section>

          {/* ── CTA Section ── */}
          <section className="py-20 bg-blue-600">
            <div className="container mx-auto px-6 text-center">
              <h2 className="text-3xl lg:text-4xl font-bold text-white mb-6">You don't need to have it figured out.</h2>
              <p className="text-blue-100 text-xl mb-10 max-w-2xl mx-auto">
                Just describe the thing that's been bugging you. We'll tell you honestly if we can fix it — and how fast.
              </p>
              <button onClick={handleCTA} className="bg-white text-blue-600 hover:bg-slate-100 px-10 py-4 rounded-full font-bold text-lg shadow-lg transition-all hover:-translate-y-1">
                Tell Me Your Problem
              </button>
            </div>
          </section>

          {/* ── Footer ── */}
          <footer id="contact" className="bg-slate-900 text-slate-300 pt-20 pb-10">
            <div className="container mx-auto px-6">
              <div className="grid md:grid-cols-2 lg:grid-cols-4 gap-12 mb-16">
                <div>
                  <div className="mb-6 cursor-pointer inline-block" onClick={() => handleNavClick('home')}>
                    <div className="bg-white/95 rounded-lg px-4 py-3 inline-block hover:scale-105 transition-transform duration-300">
                      <img
                        src="logo2 white.png"
                        alt="North Star Technology Partners"
                        className="w-auto"
                        style={{ height: '96px' }}
                      />
                    </div>
                  </div>
                  <p className="text-slate-400 mb-6">We build micro-apps and custom workflows for small business owners who are tired of doing things the hard way.</p>
                </div>
                <div>
                  <h4 className="text-white font-bold text-lg mb-6">What We Fix</h4>
                  <ul className="space-y-4">
                    {[
                      'Tracking & Reporting',
                      'Customer Follow-Up',
                      'Proof of Work',
                      'Workflow Automation',
                      'Custom Micro-Apps',
                      'Business Process Design'
                    ].map((item) => (
                      <li key={item}>
                        <button onClick={() => handleNavClick('problems')} className="hover:text-white transition-colors text-left">{item}</button>
                      </li>
                    ))}
                  </ul>
                </div>
                <div>
                  <h4 className="text-white font-bold text-lg mb-6">Company</h4>
                  <ul className="space-y-4">
                    {['About Us', 'Case Studies', 'Blog', 'Privacy Policy'].map((item) => (
                      <li key={item}><a href="#" className="hover:text-white transition-colors">{item}</a></li>
                    ))}
                  </ul>
                </div>
                <div>
                  <h4 className="text-white font-bold text-lg mb-6">Contact Us</h4>
                  <ul className="space-y-4">
                    <li className="flex items-start gap-3">
                      <MapPin className="w-5 h-5 text-blue-500 flex-shrink-0 mt-1" />
                      <span>123 Innovation Drive,<br />Tech Valley, TX 75080</span>
                    </li>
                    <li className="flex items-center gap-3">
                      <Phone className="w-5 h-5 text-blue-500 flex-shrink-0" />
                      <span>+1 (555) 123-4567</span>
                    </li>
                    <li className="flex items-center gap-3">
                      <Mail className="w-5 h-5 text-blue-500 flex-shrink-0" />
                      <span>hello@northstartech.com</span>
                    </li>
                  </ul>
                </div>
              </div>
              <div className="border-t border-slate-800 pt-8 flex flex-col md:flex-row justify-between items-center gap-4">
                <div className="text-sm">© {new Date().getFullYear()} North Star Technology Partners.</div>
              </div>
            </div>
          </footer>

        </div>
      );
    };

    const root = createRoot(document.getElementById('root'));
    root.render(<Website />);
  </script>
</body>
</html>
